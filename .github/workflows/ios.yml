name: Build & Deploy iOS to TestFlight

# Dispatch-only: TestFlight builds are deliberate, one per batch.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-macos26-${{ hashFiles('app/package-lock.json') }}
          restore-keys: derived-data-macos26-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Prebuild iOS native project
        env:
          EXPO_NO_TELEMETRY: '1'
        run: CI=1 npx expo prebuild --platform ios --clean --no-install
      - name: Strip unused push entitlement
        run: |
          for f in $(find ios -name "*.entitlements" -not -path "*Pods*"); do
            plutil -remove aps-environment "$f" 2>/dev/null && echo "stripped: $f" || true
          done

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import certificate
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > dist.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import dist.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm dist.p12

      - name: Install provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.FF_PROVISION_APP_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/${{ secrets.FF_PROVISION_APP_UUID }}.mobileprovision
          echo "${{ secrets.FF_PROVISION_WIDGET_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/${{ secrets.FF_PROVISION_WIDGET_UUID }}.mobileprovision

      - name: Decode App Store Connect key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # Two signing targets (app + widget) — global xcodebuild settings can't
      # assign different profiles per target, so patch the pbxproj instead.
      - name: Patch per-target manual signing
        env:
          FF_PROVISION_APP_NAME: ${{ secrets.FF_PROVISION_APP_NAME }}
          FF_PROVISION_WIDGET_NAME: ${{ secrets.FF_PROVISION_WIDGET_NAME }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: node "$GITHUB_WORKSPACE/.github/scripts/patch-signing.cjs" ios/UKFuelFinder.xcodeproj/project.pbxproj

      - name: Build iOS archive
        run: |
          XCWORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$XCWORKSPACE" .xcworkspace)
          xcodebuild archive \
            -workspace "$XCWORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/UKFuelFinder.xcarchive \
            -parallelizeTargets \
            -jobs 4 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>iPhone Distribution</string>
            <key>provisioningProfiles</key><dict>
              <key>com.lukeholder.ukfuelfinder</key><string>${{ secrets.FF_PROVISION_APP_UUID }}</string>
              <key>com.lukeholder.ukfuelfinder.widget</key><string>${{ secrets.FF_PROVISION_WIDGET_UUID }}</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/UKFuelFinder.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/export/*.ipa | head -1)" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uk-fuel-finder-ios
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
